<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Screening</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🤖 AI Resume Screening System</h1>
    <p>Upload your resume and let AI analyze your career fit</p>

    <form id="uploadForm">
        <input type="file" id="fileInput" accept=".pdf" required>
        <button type="submit">Analyze Resume</button>
    </form>

    <div id="loader" class="hidden">
        <div class="spinner"></div>
        <p id="loadingText">Analyzing your resume...</p>
    </div>

    <div id="result" class="hidden">
        <h2>📊 Analysis Result</h2>
        <p><strong>Top Match:</strong> <span id="topPrediction"></span></p>
        <p><strong>Suitability Score:</strong> <span id="score"></span>%</p>

        <h3>Top 3 Matches</h3>
        <ul id="top3"></ul>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
